<!DOCTYPE html>
<html>
  <head>
    <title>场景列表</title>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background-color: #121212;
        color: #e0e0e0;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 10px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
        gap: 10px;
      }

      h1 {
        color: #f5f5f5;
        margin: 0;
        font-size: 1.8rem;
      }

      /* ======== 新增：搜索框样式 ======== */
      .search-box {
        width: 100%;
        margin-bottom: 15px;
        order: -1; /* 确保搜索框在顶部（在flex布局下生效） */
      }
      
      .search-box input {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border-radius: 4px;
        border: 1px solid #444;
        background-color: #2c2c2c;
        color: #fff;
        box-sizing: border-box; /* 确保padding不撑大宽度 */
      }

      .search-box input:focus {
        outline: none;
        border-color: #666;
      }
      /* ================================ */

      .update-btn {
        background: #2e7d32;
        color: white;
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.2s;
      }
      .update-btn:hover {
        background: #1b5e20;
      }

      .scenes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
      }

      .scene-item {
        background: #1e1e1e;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        transition: transform 0.2s, box-shadow 0.2s;
        border: 1px solid #333;
      }
      .scene-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
        border-color: #555;
      }

      .scene-item a {
        text-decoration: none;
        color: #e0e0e0;
        display: block;
      }

      .scene-preview {
        width: 100%;
        height: 150px;
        object-fit: cover;
        display: block;
      }

      .scene-name {
        padding: 10px;
        font-size: 14px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* ======== 响应式部分 ======== */

      /* 平板端优化 */
      @media (max-width: 992px) {
        body { margin: 15px; }
        h1 { font-size: 1.6rem; }
        .update-btn { font-size: 15px; padding: 8px 12px; }
        .scene-preview { height: 160px; }
      }

      /* 手机端优化 */
      @media (max-width: 600px) {
        body { margin: 10px; }
        .container { padding: 0 8px; }

        .header {
          flex-direction: row; /* 改回row让标题和按钮在一行 */
          align-items: center;
          gap: 10px;
        }

        h1 { font-size: 1.2rem; flex-grow: 1; }
        .update-btn { width: auto; font-size: 14px; padding: 8px 10px; }
        
        .scenes-grid { grid-template-columns: 1fr; gap: 16px; }
        .scene-preview { height: 220px; }
        .scene-name { font-size: 16px; padding: 12px; white-space: normal; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 顶部标题栏 -->
      <div class="header">
        <h1 id="scene-count-title">场景列表 ({{ scenes|length }} 个场景)</h1>
        <button class="update-btn" onclick="updateIndex()">更新索引</button>
      </div>

      <!-- 搜索框区域 -->
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="输入关键词搜索场景标题..." oninput="filterVideos()">
      </div>

      <div class="scenes-grid">
        {% for scene in scenes %}
        <div class="scene-item" data-title="{{ scene.title|e }}">
          <a href="/scene/{{ scene.scene_id }}">
            {% if scene.preview %}
            <img
              class="scene-preview"
              src="/preview/{{ scene.scene_id }}/{{ scene.preview }}"
              alt=""
            />
            {% else %}
            <img
              class="scene-preview"
              src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAwIiBoZWlnaHQ9IjE1MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZGRkIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC1zaXplPSIxNCIgZmlsbD0iIzk5OSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPuaXoDwvdGV4dD48L3N2Zz4="
              alt="无封面"
            />
            {% endif %}
            <div class="scene-name">{{ scene.title }}</div>
          </a>
        </div>
        {% endfor %}
      </div>
    </div>

    <script>
      // 更新索引功能
      function updateIndex() {
        if (confirm("确定要更新索引吗？")) {
          fetch("/update")
            .then((response) => response.text())
            .then((message) => {
              alert(message);
              location.reload();
            });
        }
      }

      // 前端搜索过滤功能
      function filterVideos() {
        const searchInput = document.getElementById('searchInput');
        const keyword = searchInput.value.toLowerCase().trim();
        const items = document.querySelectorAll('.scene-item');
        
        let visibleCount = 0;

        items.forEach(item => {
          // 从 data-title 属性读取标题
          const title = item.getAttribute('data-title').toLowerCase();
          
          // 判断是否包含关键词
          if (title.includes(keyword)) {
            item.style.display = 'block'; // 显示
            visibleCount++;
          } else {
            item.style.display = 'none'; // 隐藏
          }
        });

        // 实时更新标题中的数量
        const titleElement = document.getElementById('scene-count-title');
        // 保持原有的格式，仅更新数字
        titleElement.textContent = `场景列表 (${visibleCount} 个场景)`;
      }
    </script>
  </body>
</html>
