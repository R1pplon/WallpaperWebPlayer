<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>场景图片鉴赏</title>
  <style>
    /* 基础复位与背景 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0a0a0a; /* 更深的背景色，更有沉浸感 */
      color: #e0e0e0; 
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif; 
      line-height: 1.6;
    }

    /* 顶部导航 */
    .header {
      padding: 20px;
      position: sticky; /* 吸顶，方便随时返回 */
      top: 0;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    .back { 
      color: #888; 
      text-decoration: none; 
      font-size: 14px;
      transition: color 0.2s;
    }
    .back:hover { color: #fff; }

    /* 图片列表容器：改为垂直排列 */
    .image-list { 
      display: flex;
      flex-direction: column;
      align-items: center; /* 居中 */
      gap: 40px; /* 图片之间的间距，增加呼吸感 */
      padding: 20px 10px 100px; /* 底部留白，方便看到最后一张 */
    }

    /* 图片条目：控制最大宽度 */
    .image-item {
      width: 100%;
      max-width: 1000px; /* 在大屏上限制宽度，避免图片拉伸过大导致模糊 */
      text-align: center;
    }

    /* 图片展示：尽可能大 */
    .image-item img {
      width: 100%; /* 宽度占满容器 */
      height: auto; /* 高度自适应 */
      border-radius: 4px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* 增加阴影，提升质感 */
      cursor: zoom-in; /* 提示可以点击查看原图 */
      transition: transform 0.3s ease;
      display: block;
    }

    /* 全屏查看层 */
    .overlay {
      display: none; 
      position: fixed; 
      inset: 0; 
      background: rgba(0,0,0,0.95); /* 全黑背景 */
      z-index: 100; 
      justify-content: center; 
      align-items: center; 
      cursor: zoom-out;
    }
    .overlay.active { display: flex; }
    .overlay img { 
      max-width: 100vw; 
      max-height: 100vh; 
      object-fit: contain; 
    }

    /* 响应式微调 */
    @media (max-width: 768px) {
      .image-list { gap: 20px; padding: 10px; }
      .header { padding: 15px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href="/scenes">← 返回场景列表</a>
  </div>

  <div class="image-list">
    {% for filename in pictures %}
    <div class="image-item">
      <img src="/scenes/{{ id }}/{{ filename }}" alt="{{ filename }}" loading="lazy"
           onclick="openOverlay(this.src)"/>
    </div>
    {% endfor %}
  </div>

  <div class="overlay" id="overlay" onclick="this.classList.remove('active')">
    <img id="big"/>
  </div>

  <script>
    function openOverlay(src) {
      const overlay = document.getElementById('overlay');
      const bigImg = document.getElementById('big');
      bigImg.src = src;
      overlay.classList.add('active');
    }
  </script>
</body>
</html>
